<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Warm espresso background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E120A"/>
      <stop offset="100%" stop-color="#160F08"/>
    </linearGradient>
    <!-- Coral glow for the dot -->
    <radialGradient id="dot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="60%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#D63B1F"/>
    </radialGradient>
    <!-- Subtle warm glow behind the dot -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to rounded square -->
    <clipPath id="rr">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rr)">
    <!-- Background -->
    <rect width="32" height="32" fill="url(#bg)"/>

    <!-- Very subtle warm mesh glow -->
    <ellipse cx="22" cy="10" rx="16" ry="14" fill="#FF4500" fill-opacity="0.06"/>

    <!-- Sonar rings — outermost to innermost (so dot renders on top) -->
    <!-- Ring 3 — faintest, largest -->
    <circle cx="16" cy="16" r="11"
      fill="none"
      stroke="#FF4500"
      stroke-width="0.7"
      stroke-opacity="0.18"/>

    <!-- Ring 2 — medium -->
    <circle cx="16" cy="16" r="8"
      fill="none"
      stroke="#FF4500"
      stroke-width="0.85"
      stroke-opacity="0.28"/>

    <!-- Ring 1 — closest, stronger -->
    <circle cx="16" cy="16" r="5.5"
      fill="none"
      stroke="#FF4500"
      stroke-width="1"
      stroke-opacity="0.45"/>

    <!-- Halo bloom behind dot -->
    <circle cx="16" cy="16" r="5" fill="url(#halo)"/>

    <!-- Core dot -->
    <circle cx="16" cy="16" r="3.2" fill="url(#dot-glow)"/>

    <!-- Specular highlight on dot — makes it feel like a physical button -->
    <circle cx="15.1" cy="14.9" r="0.9"
      fill="white"
      fill-opacity="0.35"/>
  </g>
</svg>
